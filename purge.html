<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>BiosImport – Vymazání cache</title>
<style>
  body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 20px; }
  h2 { color: #1a1a1a; }
  button { background: #f5a623; color: #1a1a1a; border: none; border-radius: 10px; padding: 14px 32px; font-size: 1.1em; font-weight: 700; cursor: pointer; width: 100%; margin-top: 16px; }
  button:hover { background: #d4891a; }
  .log { margin-top: 24px; font-size: .9em; }
  .log div { padding: 6px 10px; border-radius: 6px; margin-bottom: 6px; }
  .ok  { background: #e8f5e9; color: #2e7d32; }
  .err { background: #ffebee; color: #c62828; }
  .wait{ background: #fff8e1; color: #795548; }
</style>
</head>
<body>
<h2>🚀 BiosImport – Vymazání jsDelivr cache</h2>
<p>Klikni na tlačítko po každém nahrání souborů na GitHub.</p>
<button onclick="purgeAll()">Vymazat cache všech souborů</button>
<div class="log" id="log"></div>
<script>
var files = [
  'Shoptetcustom.css',
  'homepage.js',
  'footer.js',
  'zeppelin_logo.svg',
  'logo_galaxy-removebg-preview.png',
  'rhinoceros-tractor-logo.webp',
  'images-removebg-preview.png'
];

function log(msg, type) {
  var d = document.createElement('div');
  d.className = type || 'wait';
  d.textContent = msg;
  document.getElementById('log').appendChild(d);
}

async function purgeAll() {
  document.getElementById('log').innerHTML = '';
  log('Mažu cache...', 'wait');
  for (var i = 0; i < files.length; i++) {
    var url = 'https://purge.jsdelivr.net/gh/Softema/biosimport@main/' + files[i];
    try {
      var r = await fetch(url);
      var j = await r.json();
      if (j.status === 'finished' || r.ok) {
        log('✅ ' + files[i], 'ok');
      } else {
        log('⚠️ ' + files[i] + ' – ' + (j.status || 'neznámý stav'), 'err');
      }
    } catch(e) {
      log('❌ ' + files[i] + ' – chyba: ' + e.message, 'err');
    }
  }
  log('Hotovo! Teď otevři e-shop a stiskni Ctrl+Shift+R', 'ok');
}
</script>
</body>
</html>
